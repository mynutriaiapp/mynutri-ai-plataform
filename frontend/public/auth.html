<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acesse sua conta — MyNutri AI</title>
  <meta name="description" content="Faça login ou crie sua conta para acessar suas dietas personalizadas." />
  <link rel="stylesheet" href="../src/styles/index.css" />
  <style>
    /* Estilos locais para auth.html */
    body {
      background: url('../src/assets/auth-bg.png') center/cover no-repeat fixed;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
    }
    body::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(240, 253, 244, 0.6);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      z-index: -1;
    }
    .auth-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }
    .auth-card {
      background: var(--white);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-xl);
      width: 100%;
      max-width: 480px;
      padding: 48px;
      position: relative;
      overflow: hidden;
    }
    .auth-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 4px;
      background: var(--gradient-primary);
    }
    .auth-header {
      text-align: center;
      margin-bottom: 32px;
    }
    .auth-logo {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
    }
    .auth-title {
      font-family: 'Outfit', sans-serif;
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--gray-900);
      margin-bottom: 8px;
    }
    .auth-subtitle {
      font-size: .9375rem;
      color: var(--gray-500);
    }
    .auth-tabs {
      display: flex;
      background: var(--gray-100);
      padding: 4px;
      border-radius: var(--radius-lg);
      margin-bottom: 32px;
    }
    .auth-tab {
      flex: 1;
      padding: 10px;
      text-align: center;
      font-weight: 600;
      font-size: .9375rem;
      color: var(--gray-500);
      border-radius: var(--radius-md);
      transition: all var(--duration) ease;
      cursor: pointer;
    }
    .auth-tab.active {
      background: var(--white);
      color: var(--gray-900);
      box-shadow: var(--shadow-sm);
    }
    .form-group {
      margin-bottom: 20px;
      text-align: left;
    }
    .form-label {
      display: block;
      font-size: .875rem;
      font-weight: 600;
      color: var(--gray-700);
      margin-bottom: 8px;
    }
    .form-input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--gray-200);
      border-radius: var(--radius-md);
      font-size: .9375rem;
      transition: all .2s ease;
      font-family: inherit;
    }
    .form-input:focus {
      outline: none;
      border-color: var(--green-400);
      box-shadow: 0 0 0 4px rgba(34,197,94,.1);
    }
    .forgot-password {
      display: block;
      text-align: right;
      font-size: .8125rem;
      color: var(--green-600);
      font-weight: 500;
      margin-top: 8px;
    }
    .btn-submit {
      width: 100%;
      padding: 14px;
      border-radius: var(--radius-md);
      background: var(--gradient-primary);
      color: var(--white);
      border: none;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      box-shadow: var(--shadow-green);
      transition: all var(--duration) ease;
      margin-top: 12px;
    }
    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 35px -5px rgba(34,197,94,.45);
    }
    .auth-form {
      display: none;
    }
    .auth-form.active {
      display: block;
      animation: fadeIn .4s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .intent-message {
      background: var(--green-50);
      color: var(--green-800);
      padding: 16px;
      border-radius: var(--radius-md);
      font-size: .875rem;
      margin-bottom: 24px;
      text-align: center;
      border: 1px solid var(--green-200);
      display: none;
    }
    .intent-message.visible { display: block; }
    .social-auth {
      margin-top: 32px;
      text-align: center;
    }
    .social-auth-divider {
      display: flex;
      align-items: center;
      margin-bottom: 24px;
    }
    .social-auth-divider::before, .social-auth-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--gray-200);
    }
    .social-auth-divider span {
      padding: 0 16px;
      color: var(--gray-400);
      font-size: .8125rem;
    }
    .btn-social {
      width: 100%;
      padding: 12px;
      border-radius: var(--radius-md);
      background: var(--white);
      border: 1px solid var(--gray-200);
      color: var(--gray-700);
      font-weight: 500;
      font-size: .9375rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      cursor: pointer;
      transition: background .2s ease;
    }
    .btn-social:hover { background: var(--gray-50); }
  </style>
</head>
<body>

  <header class="header scrolled" style="position: relative;">
    <div class="container header-inner" style="justify-content: center;">
      <a href="index.html" class="logo">
        <div class="logo-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2a7 7 0 0 0-7 7c0 5 7 13 7 13s7-8 7-13a7 7 0 0 0-7-7z"/>
            <circle cx="12" cy="9" r="2.5"/>
          </svg>
        </div>
        MyNutri <span>AI</span>
      </a>
    </div>
  </header>

  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <h1 class="auth-title">Boas-vindas</h1>
        <p class="auth-subtitle">Acesse sua conta ou crie uma nova para continuar.</p>
      </div>

      <div class="intent-message" id="intent-message">
        Sua dieta está pronta! Crie uma conta ou faça login para visualizá-la e salvá-la em seu perfil.
      </div>

      <div class="auth-tabs">
        <div class="auth-tab active" data-target="login-form">Acessar</div>
        <div class="auth-tab" data-target="register-form">Criar Conta</div>
      </div>

      <!-- Login Form -->
      <form class="auth-form active" id="login-form">
        <div class="form-group">
          <label class="form-label">E-mail</label>
          <input type="email" class="form-input" placeholder="seu@email.com" required>
        </div>
        <div class="form-group">
          <label class="form-label">Senha</label>
          <input type="password" class="form-input" placeholder="••••••••" required>
          <a href="#" class="forgot-password">Esqueceu a senha?</a>
        </div>
        <button type="submit" class="btn-submit">Entrar na Plataforma</button>
      </form>

      <!-- Register Form -->
      <form class="auth-form" id="register-form">
        <div class="form-group">
          <label class="form-label">Nome Completo</label>
          <input type="text" class="form-input" placeholder="Seu nome" required>
        </div>
        <div class="form-group">
          <label class="form-label">E-mail</label>
          <input type="email" class="form-input" placeholder="seu@email.com" required>
        </div>
        <div class="form-group">
          <label class="form-label">Senha</label>
          <input type="password" class="form-input" placeholder="Crie uma senha forte" required>
        </div>
        <button type="submit" class="btn-submit">Criar minha conta</button>
      </form>

      <div class="social-auth">
        <div class="social-auth-divider">
          <span>OU</span>
        </div>
        <button class="btn-social">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Continuar com Google
        </button>
      </div>

    </div>
  </div>

  <script>
    const API_BASE = 'https://mynutri-ai-plataform-production.up.railway.app/api/v1';

    // ── Tab switching ──────────────────────────────────────────────────────────
    const tabs = document.querySelectorAll('.auth-tab');
    const forms = document.querySelectorAll('.auth-form');

    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        tabs.forEach(t => t.classList.remove('active'));
        forms.forEach(f => f.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById(tab.getAttribute('data-target')).classList.add('active');
        clearError();
      });
    });

    // ── Intent param ──────────────────────────────────────────────────────────
    const urlParams = new URLSearchParams(window.location.search);
    const intent = urlParams.get('intent');

    if (intent === 'save_diet') {
      document.getElementById('intent-message').classList.add('visible');
      tabs[1].click();
      document.querySelector('.auth-title').textContent = 'Quase lá!';
      document.querySelector('.auth-subtitle').textContent = 'Faltam poucos segundos para ver sua dieta.';
    }

    // ── Helpers ───────────────────────────────────────────────────────────────
    function setLoading(btn, loading) {
      btn.disabled = loading;
      btn.style.opacity = loading ? '0.7' : '1';
      btn.style.pointerEvents = loading ? 'none' : '';
      if (loading) btn.dataset.original = btn.textContent;
      else btn.textContent = btn.dataset.original || btn.textContent;
    }

    function showError(msg) {
      let el = document.getElementById('auth-error');
      if (!el) {
        el = document.createElement('p');
        el.id = 'auth-error';
        el.style.cssText = 'color:#dc2626;font-size:.875rem;margin-top:12px;text-align:center;';
        document.querySelector('.auth-card').appendChild(el);
      }
      el.textContent = msg;
    }

    function clearError() {
      const el = document.getElementById('auth-error');
      if (el) el.textContent = '';
    }

    function saveSession(data) {
      localStorage.setItem('mynutri_token', data.token);
      localStorage.setItem('mynutri_refresh', data.refresh);
      if (data.user) localStorage.setItem('mynutri_user', JSON.stringify(data.user));
    }

    function afterAuth() {
      // Se veio do questionário com dieta salva em sessionStorage, vai gerar a dieta
      if (intent === 'save_diet' && sessionStorage.getItem('anamneseData')) {
        window.location.href = 'dieta.html?generate=1';
      } else {
        window.location.href = 'dieta.html';
      }
    }

    // ── Login ─────────────────────────────────────────────────────────────────
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      clearError();
      const btn = e.target.querySelector('button[type="submit"]');
      const email = e.target.querySelector('input[type="email"]').value.trim();
      const senha = e.target.querySelector('input[type="password"]').value;

      setLoading(btn, true);
      btn.textContent = 'Entrando...';

      try {
        const res = await fetch(`${API_BASE}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password: senha }),
        });
        const data = await res.json();

        if (!res.ok) {
          showError(data.detail || 'E-mail ou senha inválidos.');
          setLoading(btn, false);
          return;
        }

        saveSession(data);
        afterAuth();
      } catch {
        showError('Erro de conexão. Verifique se o servidor está rodando.');
        setLoading(btn, false);
      }
    });

    // ── Cadastro ──────────────────────────────────────────────────────────────
    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      clearError();
      const btn = e.target.querySelector('button[type="submit"]');
      const inputs = e.target.querySelectorAll('input');
      const nome  = inputs[0].value.trim();
      const email = inputs[1].value.trim();
      const senha = inputs[2].value;

      if (senha.length < 8) {
        showError('A senha deve ter pelo menos 8 caracteres.');
        return;
      }

      setLoading(btn, true);
      btn.textContent = 'Criando conta...';

      try {
        const res = await fetch(`${API_BASE}/auth/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ nome, email, senha }),
        });
        const data = await res.json();

        if (!res.ok) {
          const msg = data.email?.[0] || data.senha?.[0] || data.nome?.[0] || 'Erro ao criar conta.';
          showError(msg);
          setLoading(btn, false);
          return;
        }

        saveSession(data);
        afterAuth();
      } catch {
        showError('Erro de conexão. Verifique se o servidor está rodando.');
        setLoading(btn, false);
      }
    });

    // Page transitions
    document.querySelectorAll('a[href]').forEach(link => {
      const href = link.getAttribute('href');
      if (!href || href.startsWith('#') || href.startsWith('http')) return;
      link.addEventListener('click', (e) => {
        e.preventDefault();
        document.body.classList.add('page-leaving');
        setTimeout(() => { window.location.href = href; }, 260);
      });
    });
  </script>
</body>
</html>
