<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acesse sua conta — MyNutri AI</title>
  <meta name="description" content="Faça login ou crie sua conta para acessar suas dietas personalizadas." />
  <link rel="icon" type="image/png" href="/static/src/assets/mynutriai-logo.png" />
  <link rel="stylesheet" href="/static/src/styles/index.css" />
  <link rel="stylesheet" href="/static/src/styles/auth.css" />
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

  <header class="header scrolled" style="position: relative;">
    <div class="container header-inner" style="justify-content: space-between;">
      <a href="/" class="logo">
        <img src="/static/src/assets/mynutriai-logo.png" alt="MyNutri AI" />
        MyNutri <span>AI</span>
      </a>
      <!-- Dark Mode Toggle -->
      <button class="theme-toggle" id="theme-toggle" aria-label="Alternar tema escuro" title="Alternar tema">
        <svg class="sun-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"></circle>
          <line x1="12" y1="1" x2="12" y2="3"></line>
          <line x1="12" y1="21" x2="12" y2="23"></line>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
          <line x1="1" y1="12" x2="3" y2="12"></line>
          <line x1="21" y1="12" x2="23" y2="12"></line>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
        <svg class="moon-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
      </button>
    </div>
  </header>

  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <h1 class="auth-title">Boas-vindas</h1>
        <p class="auth-subtitle">Acesse sua conta ou crie uma nova para continuar.</p>
      </div>

      <div class="intent-message" id="intent-message">
        Sua dieta está pronta! Crie uma conta ou faça login para visualizá-la e salvá-la em seu perfil.
      </div>

      <div class="auth-tabs">
        <div class="auth-tab active" data-target="login-form">Acessar</div>
        <div class="auth-tab" data-target="register-form">Criar Conta</div>
      </div>

      <!-- Login Form -->
      <form class="auth-form active" id="login-form">
        <div class="form-group">
          <label class="form-label">E-mail</label>
          <input type="email" class="form-input" placeholder="seu@email.com" required>
        </div>
        <div class="form-group">
          <label class="form-label">Senha</label>
          <input type="password" class="form-input" placeholder="••••••••" required>
          <a href="#" class="forgot-password">Esqueceu a senha?</a>
        </div>
        <button type="submit" class="btn-submit">Entrar na Plataforma</button>
      </form>

      <!-- Register Form -->
      <form class="auth-form" id="register-form">
        <div class="form-group">
          <label class="form-label">Nome Completo</label>
          <input type="text" class="form-input" placeholder="Seu nome" required>
        </div>
        <div class="form-group">
          <label class="form-label">E-mail</label>
          <input type="email" class="form-input" placeholder="seu@email.com" required>
        </div>
        <div class="form-group">
          <label class="form-label">Senha</label>
          <input type="password" class="form-input" placeholder="Crie uma senha forte" required>
        </div>
        <button type="submit" class="btn-submit">Criar minha conta</button>
      </form>

      <div class="social-auth">
        <div class="social-auth-divider">
          <span>OU</span>
        </div>
        <div style="position:relative;display:block;">
          <button class="btn-social" id="btn-google" type="button" style="pointer-events:none;width:100%;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            Continuar com Google
          </button>
          <div id="google-btn-hidden" style="position:absolute;top:0;left:0;right:0;bottom:0;opacity:0;cursor:pointer;overflow:hidden;"></div>
        </div>
      </div>

    </div>
  </div>

  <script>
    // --- Dark Mode System ---
    (function() {
      const THEME_KEY = 'mynutri_theme';
      const html = document.documentElement;
      const themeToggle = document.getElementById('theme-toggle');

      /**
       * Initialize theme on page load
       * Priority: localStorage > system preference > light mode
       */
      function initializeTheme() {
        const saved = localStorage.getItem(THEME_KEY);

        if (saved) {
          // User has a saved preference
          setTheme(saved);
        } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
          // No saved preference, use system preference
          setTheme('dark');
        } else {
          // Default to light mode
          setTheme('light');
        }
      }

      /**
       * Apply theme by setting class on html element
       */
      function setTheme(theme) {
        if (theme === 'dark') {
          html.classList.add('dark');
          localStorage.setItem(THEME_KEY, 'dark');
        } else {
          html.classList.remove('dark');
          localStorage.setItem(THEME_KEY, 'light');
        }
      }

      /**
       * Toggle between light and dark theme
       */
      function toggleTheme() {
        const isDark = html.classList.contains('dark');
        setTheme(isDark ? 'light' : 'dark');
      }

      // Initialize theme on page load
      initializeTheme();

      // Listen for theme toggle button click
      if (themeToggle) {
        themeToggle.addEventListener('click', toggleTheme);
      }

      // Listen for system theme changes
      if (window.matchMedia) {
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
          // Only update if user hasn't set a preference
          if (!localStorage.getItem(THEME_KEY)) {
            setTheme(e.matches ? 'dark' : 'light');
          }
        });
      }
    })();

    const API_BASE = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' ? 'http://127.0.0.1:8000/api/v1' : '/api/v1';

    // Exibe erros vindos do callback do Google OAuth (redirect flow)
    const googleErrorParam = new URLSearchParams(window.location.search).get('google_error');
    if (googleErrorParam) {
      const googleErrorMessages = {
        csrf: 'Falha de segurança no login com Google. Tente novamente.',
        invalid_token: 'Token Google inválido ou expirado. Tente novamente.',
        no_email: 'Não foi possível obter o e-mail da conta Google.',
        service_unavailable: 'Serviço Google indisponível. Tente mais tarde.',
        no_credential: 'Credencial Google não recebida. Tente novamente.',
      };
      const msg = googleErrorMessages[googleErrorParam] || 'Erro ao autenticar com Google.';
      // Exibe após o DOM carregar completamente
      requestAnimationFrame(() => showError(msg));
    }

    // ── Tab switching ──────────────────────────────────────────────────────────
    const tabs = document.querySelectorAll('.auth-tab');
    const forms = document.querySelectorAll('.auth-form');

    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        tabs.forEach(t => t.classList.remove('active'));
        forms.forEach(f => f.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById(tab.getAttribute('data-target')).classList.add('active');
        clearError();
      });
    });

    // ── Intent param ──────────────────────────────────────────────────────────
    const urlParams = new URLSearchParams(window.location.search);
    const intent = urlParams.get('intent');

    if (intent === 'save_diet') {
      document.getElementById('intent-message').classList.add('visible');
      tabs[1].click();
      document.querySelector('.auth-title').textContent = 'Quase lá!';
      document.querySelector('.auth-subtitle').textContent = 'Faltam poucos segundos para ver sua dieta.';
    }

    // ── Helpers ───────────────────────────────────────────────────────────────
    function setLoading(btn, loading) {
      btn.disabled = loading;
      btn.style.opacity = loading ? '0.7' : '1';
      btn.style.pointerEvents = loading ? 'none' : '';
      if (loading) btn.dataset.original = btn.textContent;
      else btn.textContent = btn.dataset.original || btn.textContent;
    }

    function showError(msg) {
      let el = document.getElementById('auth-error');
      if (!el) {
        el = document.createElement('p');
        el.id = 'auth-error';
        el.style.cssText = 'color:#dc2626;font-size:.875rem;margin-top:12px;text-align:center;';
        document.querySelector('.auth-card').appendChild(el);
      }
      el.textContent = msg;
    }

    function clearError() {
      const el = document.getElementById('auth-error');
      if (el) el.textContent = '';
    }

    function saveSession(data) {
      // Tokens são guardados em cookies HttpOnly pelo servidor (Set-Cookie no response).
      // Só salvamos metadados do usuário no localStorage — não contém credenciais.
      if (data.user) localStorage.setItem('mynutri_user', JSON.stringify(data.user));
    }

    function afterAuth() {
      // Se veio do questionário com dieta salva em sessionStorage, vai gerar a dieta
      if (intent === 'save_diet' && sessionStorage.getItem('anamneseData')) {
        window.location.href = '/dieta/?generate=1';
      } else {
        window.location.href = '/dieta/';
      }
    }

    // ── Login ─────────────────────────────────────────────────────────────────
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      clearError();
      const btn = e.target.querySelector('button[type="submit"]');
      const email = e.target.querySelector('input[type="email"]').value.trim();
      const senha = e.target.querySelector('input[type="password"]').value;

      setLoading(btn, true);
      btn.textContent = 'Entrando...';

      try {
        const res = await fetch(`${API_BASE}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ email, password: senha }),
        });
        const data = await res.json();

        if (!res.ok) {
          showError(data.detail || 'E-mail ou senha inválidos.');
          setLoading(btn, false);
          return;
        }

        saveSession(data);
        afterAuth();
      } catch {
        showError('Erro de conexão. Verifique se o servidor está rodando.');
        setLoading(btn, false);
      }
    });

    // ── Cadastro ──────────────────────────────────────────────────────────────
    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      clearError();
      const btn = e.target.querySelector('button[type="submit"]');
      const inputs = e.target.querySelectorAll('input');
      const nome  = inputs[0].value.trim();
      const email = inputs[1].value.trim();
      const senha = inputs[2].value;

      if (senha.length < 8) {
        showError('A senha deve ter pelo menos 8 caracteres.');
        return;
      }

      setLoading(btn, true);
      btn.textContent = 'Criando conta...';

      try {
        const res = await fetch(`${API_BASE}/auth/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ nome, email, senha }),
        });
        const data = await res.json();

        if (!res.ok) {
          const msg = data.email?.[0] || data.senha?.[0] || data.nome?.[0] || 'Erro ao criar conta.';
          showError(msg);
          setLoading(btn, false);
          return;
        }

        saveSession(data);
        afterAuth();
      } catch {
        showError('Erro de conexão. Verifique se o servidor está rodando.');
        setLoading(btn, false);
      }
    });

    // ── Google Sign-In ────────────────────────────────────────────────────────
    const GOOGLE_CLIENT_ID = '806980657199-js2h4t4o9cq8577c7geulvgosdt777t2.apps.googleusercontent.com';

    async function handleGoogleCredential(response) {
      clearError();
      console.log('[Google Auth] callback received', response?.credential ? 'credential OK' : 'NO credential');
      if (!response?.credential) {
        showError('Credencial Google inválida. Tente novamente.');
        return;
      }
      try {
        console.log('[Google Auth] fetching', `${API_BASE}/auth/google`);
        const res = await fetch(`${API_BASE}/auth/google`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ id_token: response.credential }),
        });
        console.log('[Google Auth] response status', res.status);
        const data = await res.json();
        console.log('[Google Auth] response data', data);

        if (!res.ok) {
          showError(data.error || `Erro ao autenticar com Google (${res.status}).`);
          return;
        }

        saveSession(data);
        console.log('[Google Auth] session saved, redirecting to /dieta/');
        afterAuth();
      } catch (err) {
        console.error('[Google Auth] fetch error:', err);
        showError('Erro de conexão ao autenticar com Google. Verifique se o servidor está rodando.');
      }
    }

    function initGoogleSignIn() {
      if (!window.google) return;
      // Modo redirect: ao clicar, a PÁGINA navega para o Google OAuth (sem popup).
      // Após autenticação, o Google faz POST para login_uri (backend) que seta cookies
      // e redireciona para /dieta/. Evita o problema do popup em branco no localhost.
      const loginUri = `${window.location.origin}/api/v1/auth/google/callback`;
      google.accounts.id.initialize({
        client_id: GOOGLE_CLIENT_ID,
        auto_select: false,
        ux_mode: 'redirect',
        login_uri: loginUri,
      });
      const container = document.getElementById('google-btn-hidden');
      const width = Math.min(container.parentElement.offsetWidth || 400, 400);
      google.accounts.id.renderButton(container, { theme: 'outline', size: 'large', width });
    }

    if (window.google) {
      initGoogleSignIn();
    } else {
      document.querySelector('script[src*="accounts.google.com"]')
        .addEventListener('load', initGoogleSignIn);
    }

    // Page transitions
    document.querySelectorAll('a[href]').forEach(link => {
      const href = link.getAttribute('href');
      if (!href || href.startsWith('#') || href.startsWith('http')) return;
      link.addEventListener('click', (e) => {
        e.preventDefault();
        document.body.classList.add('page-leaving');
        setTimeout(() => { window.location.href = href; }, 260);
      });
    });
  </script>
</body>
</html>
